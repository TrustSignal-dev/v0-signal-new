version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - javascript
    open-pull-requests-limit: 5
    # Patch-only policy for this public frontend. Major/minor updates require
    # explicit, manual batching and review outside automated Dependabot flow.
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    groups:
      patch-deps:
        patterns:
          - "*"
        update-types:
          - patch
