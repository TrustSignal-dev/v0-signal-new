<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="TrustSignal mark">
  <!-- Left end-cap tick -->
  <rect x="4" y="60" width="14" height="8" rx="1.5" fill="currentColor"/>
  <!-- Bar 1 (short) -->
  <rect x="26" y="48" width="8" height="32" rx="1.5" fill="currentColor"/>
  <!-- Bar 2 (medium) -->
  <rect x="42" y="36" width="8" height="56" rx="1.5" fill="currentColor"/>
  <!-- Bar 3 (tallest, center) -->
  <rect x="60" y="24" width="8" height="80" rx="1.5" fill="currentColor"/>
  <!-- Bar 4 (medium) -->
  <rect x="78" y="36" width="8" height="56" rx="1.5" fill="currentColor"/>
  <!-- Bar 5 (short) -->
  <rect x="94" y="48" width="8" height="32" rx="1.5" fill="currentColor"/>
  <!-- Right end-cap tick -->
  <rect x="110" y="60" width="14" height="8" rx="1.5" fill="currentColor"/>
